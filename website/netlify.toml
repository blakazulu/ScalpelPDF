# Netlify deploy config for the Scalpel marketing site.
# This file lives in website/. Set "Base directory" = website in the Netlify UI;
# Netlify then reads this file from there and these paths are relative to website/.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Clean on-domain download link → the latest GitHub Release asset (binary stays
# on GitHub's CDN: no repo bloat, no Netlify bandwidth). Must come before the
# catch-all below — redirects are matched top to bottom, first match wins.
[[redirects]]
  from = "/download"
  to = "https://github.com/blakazulu/ScalpelPDF/releases/latest/download/Scalpel.exe"
  status = 302
  force = true

# SPA-free static site, but keep a catch-all so deep links resolve to the page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
